<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTS Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin:0;
    font-family: "Segoe UI", sans-serif;
    height:100vh;
    overflow:hidden;
    background: radial-gradient(circle at top, #1e293b, #020617);
}

/* 🔥 ANIMATED BACKGROUND */
body::before {
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(circle, rgba(56,189,248,0.2) 10%, transparent 10%);
    background-size: 50px 50px;
    animation: moveBg 20s linear infinite;
}

@keyframes moveBg {
    from { transform: translate(0,0); }
    to { transform: translate(-200px,-200px); }
}

/* CONTAINER */
.login-box {
    position:relative;
    z-index:2;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    padding:40px;
    border-radius:20px;
    width:360px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.6);
    text-align:center;
    margin:auto;
    top:50%;
    transform:translateY(-50%);
}

/* LOGO */
.logo {
    width:70px;
    margin-bottom:10px;
}

/* TITLE */
.title h1 {
    font-size:22px;
    color:#38bdf8;
    margin:0;
}

.title h2 {
    color:white;
    font-weight:normal;
    margin:5px 0;
}

.tagline {
    font-size:13px;
    color:#94a3b8;
    margin-bottom:20px;
}

/* 🔥 PREMIUM TEXT */
.welcome {
    font-size:18px;
    color:#f8fafc;
    margin-bottom:10px;
    letter-spacing:1px;
}

.subtext {
    font-size:12px;
    color:#94a3b8;
    margin-bottom:20px;
}

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    outline:none;
}

/* PASSWORD */
.password-box {
    position:relative;
}

.password-box i {
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

/* BUTTON */
button {
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

button:hover {
    background:#0ea5e9;
}

/* FOOTER */
.footer {
    margin-top:15px;
    font-size:11px;
    color:#64748b;
}

</style>

</head>

<body>

<div class="login-box">

    <!-- LOGO -->
    <img src="/static/logo.png" class="logo">

    <!-- TITLE -->
    <div class="title">
        <h1>IIT Bombay</h1>
        <h2>Administration</h2>
        <p class="tagline">Document Tracking System</p>
    </div>

    <!-- FORM -->
    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>

        <div class="password-box">
            <input type="password" id="password" name="password" placeholder="Password" required>
            <i class="fa fa-eye" onclick="togglePassword(this)"></i>
        </div>

        <button type="submit">🔐 Secure Login</button>
    </form>

    <div class="footer">
       • Authorized Personnel Only •
    </div>

</div>

<!-- JS -->
<script>
function togglePassword(icon) {
    let pass = document.getElementById("password");

    if (pass.type === "password") {
        pass.type = "text";
        icon.classList.replace("fa-eye","fa-eye-slash");
    } else {
        pass.type = "password";
        icon.classList.replace("fa-eye-slash","fa-eye");
    }
}
</script>

</body>
</html>
